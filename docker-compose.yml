version: '3.8'

services:
  # 1. PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: foodmart-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: foodmart
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      # Auto-run database.sql on first startup
      - ./database/database.sql:/docker-entrypoint-initdb.d/init.sql
      # Persist data 
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Node.js + Python Backend
  backend:
    build: 
      context: ./backend
    container_name: foodmart-backend
    ports:
      - "5000:5000"
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db       
      - DB_NAME=foodmart
      - DB_PORT=5432
      - IS_DOCKER=true   
    depends_on:
      db:
        condition: service_healthy

  # 3. React Frontend
  frontend:
    build: 
      context: ./frontend
    container_name: foodmart-frontend
    ports:
      - "3000:80"
    environment:
      - WATCHPACK_POLLING=true
    depends_on:
      - backend

volumes:
  postgres_data: